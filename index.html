<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio dynamique de Mathis Lefevre">
    <title>Portfolio | mathiceuh</title>

    <style>
        :root {
            --bg-color: #0d1117;
            --bg-card: #161b22;
            --bg-card-hover: #21262d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #58a6ff;
            --border-color: #30363d;
            --skeleton-bg: #21262d;
            --skeleton-shimmer: #30363d;

            --border-radius-lg: 12px;
            --border-radius-sm: 6px;
            --transition-speed: 0.3s;
            --max-width: 1000px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color var(--transition-speed) ease;
        }

        a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0;
        }

        .delay-1 {
            animation-delay: 0.2s;
        }

        .delay-2 {
            animation-delay: 0.4s;
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }

            100% {
                background-position: 1000px 0;
            }
        }

        .skeleton {
            background: var(--skeleton-bg);
            background-image: linear-gradient(90deg,
                    var(--skeleton-bg) 0px,
                    var(--skeleton-shimmer) 40px,
                    var(--skeleton-bg) 80px);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite linear;
            border-radius: var(--border-radius-sm);
        }

        .skeleton-text {
            height: 1em;
            width: 100%;
            margin-bottom: 0.5rem;
        }

        .skeleton-text.short {
            width: 40%;
        }

        .skeleton-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 4rem;
        }

        .avatar-container {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--border-color);
            object-fit: cover;
            transition: transform var(--transition-speed) ease;
        }

        .avatar:hover {
            transform: scale(1.05);
            border-color: var(--accent-color);
        }

        .hero h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }

        .bio {
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .badges {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .badge svg {
            width: 16px;
            height: 16px;
            margin-right: 6px;
            fill: currentColor;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition-speed) ease, border-color var(--transition-speed) ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .card-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .card-title a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .card-title a:hover {
            text-decoration: underline;
        }


        .card-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stat {
            display: flex;
            align-items: center;
        }

        .stat svg {
            width: 14px;
            height: 14px;
            margin-right: 4px;
            fill: currentColor;
        }

        .lang-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        .languages-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 4rem;
        }

        .lang-tag {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .footer {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
            margin-top: 4rem;
            color: var(--text-muted);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .social-links a {
            color: var(--text-main);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1.2rem;
            border-radius: var(--border-radius-sm);
            transition: background var(--transition-speed) ease, color var(--transition-speed) ease;
        }

        .social-links a:hover {
            background: var(--bg-card-hover);
            color: var(--accent-color);
            text-decoration: none;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            font-size: 0.8rem;
            margin-top: 1rem;
        }

        .pulsing-dot {
            width: 8px;
            height: 8px;
            background-color: #2ea043;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 0 0 rgba(46, 160, 67, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(46, 160, 67, 0.7);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(46, 160, 67, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(46, 160, 67, 0);
            }
        }

        .error-message {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.4);
            color: #ff7b72;
            padding: 1rem;
            border-radius: var(--border-radius-sm);
            text-align: center;
            margin-bottom: 2rem;
            display: none;
        }

        @media (max-width: 600px) {
            .hero h1 {
                font-size: 1.8rem;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .social-links {
                flex-direction: column;
                gap: 0.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div id="error-container" class="error-message fade-in">
            <p>Impossible de charger les données pour le moment. Veuillez réessayer plus tard.</p>
        </div>

        <section class="hero fade-in">
            <div class="avatar-container">
                <div id="avatar-skeleton" class="skeleton skeleton-circle"></div>
            </div>

            <h1 id="user-name">
                <div class="skeleton skeleton-text" style="width: 200px; height: 1.5em; margin: 0 auto;"></div>
            </h1>
            <div id="user-bio" class="bio">
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text short" style="margin: 0 auto;"></div>
            </div>

            <div id="badges-container" class="badges">
            </div>
        </section>

        <section class="fade-in delay-1">
            <h2 class="section-title">Projets récents</h2>
            <div id="projects-grid" class="projects-grid">
                <div class="card skeleton-card">
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text" style="margin-top: 1rem; height: 3rem;"></div>
                    <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                        <div class="skeleton skeleton-text short"></div>
                        <div class="skeleton skeleton-text short"></div>
                    </div>
                </div>
                <div class="card skeleton-card">
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text" style="margin-top: 1rem; height: 3rem;"></div>
                    <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                        <div class="skeleton skeleton-text short"></div>
                        <div class="skeleton skeleton-text short"></div>
                    </div>
                </div>
                <div class="card skeleton-card">
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text" style="margin-top: 1rem; height: 3rem;"></div>
                    <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                        <div class="skeleton skeleton-text short"></div>
                        <div class="skeleton skeleton-text short"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="fade-in delay-2">
            <h2 class="section-title">Langages dominants</h2>
            <div id="languages-container" class="languages-container">
                <div class="skeleton skeleton-text short" style="height: 2.5rem; border-radius: 20px;"></div>
                <div class="skeleton skeleton-text" style="width: 30%; height: 2.5rem; border-radius: 20px;"></div>
            </div>
        </section>

        <footer class="footer fade-in delay-2">
            <div class="social-links" id="social-links">
                <a href="https://github.com/mathiceuh" target="_blank" rel="noopener noreferrer">GitHub</a>
                <a href="https://www.linkedin.com/in/mathis-lefèvre-174744364/" target="_blank"
                    rel="noopener noreferrer">LinkedIn</a>
            </div>

            <div class="live-indicator">
                <span class="pulsing-dot"></span>
                <span>Données synchronisées en temps réel depuis GitHub</span>
            </div>
        </footer>

    </div>

    <svg style="display: none;">

    <script>
        const GITHUB_USERNAME = 'mathiceuh';

        const languageColors = {
            'JavaScript': '#f1e05a',
            'TypeScript': '#3178c6',
            'Python': '#3572A5',
            'HTML': '#e34c26',
            'CSS': '#563d7c',
            'Java': '#b07219',
            'C++': '#f34b7d',
            'C#': '#178600',
            'PHP': '#4F5D95',
            'Ruby': '#701516',
            'Go': '#00ADD8',
            'Rust': '#dea584',
            'Shell': '#89e051',
            'Vue': '#41b883',
            'React': '#61dafb'
        };

        function getLangColor(lang) {
            return languageColors[lang] || '#cccccc';
        }

        async function fetchGitHubData() {
            try {
                const [profileRes, reposRes] = await Promise.all([
                    fetch(`https://api.github.com/users/${GITHUB_USERNAME}`),
                    fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=6`)
                ]);

                if (!profileRes.ok || !reposRes.ok) {
                    throw new Error('API GitHub indisponible ou limite atteinte.');
                }

                const profile = await profileRes.json();
                const repos = await reposRes.json();

                renderProfile(profile);
                renderRepos(repos);
                renderLanguages(repos);

            } catch (error) {
                console.error('Erreur lors de la récupération des données GitHub:', error);
                document.getElementById('error-container').style.display = 'block';
            }
        }

        function renderProfile(profile) {
            const avatarContainer = document.querySelector('.avatar-container');
            const img = document.createElement('img');
            img.src = profile.avatar_url;
            img.alt = `Avatar de ${profile.login}`;
            img.className = 'avatar';

            document.getElementById('avatar-skeleton').remove();
            avatarContainer.appendChild(img);

            const nameEl = document.getElementById('user-name');
            nameEl.textContent = profile.name || profile.login;

            const bioEl = document.getElementById('user-bio');
            bioEl.textContent = profile.bio || "Développeur passionné sur GitHub.";

            const badgesContainer = document.getElementById('badges-container');
            badgesContainer.innerHTML = '';

            if (profile.location) {
                appendBadge(badgesContainer, 'icon-location', profile.location);
            }
            appendBadge(badgesContainer, 'icon-users', `${profile.followers} abonnés`);
            appendBadge(badgesContainer, 'icon-repo', `${profile.public_repos} repos`);

            if (profile.twitter_username) {
                const socialLinks = document.getElementById('social-links');
                const twitterLink = document.createElement('a');
                twitterLink.href = `https://twitter.com/${profile.twitter_username}`;
                twitterLink.target = "_blank";
                twitterLink.rel = "noopener noreferrer";
                twitterLink.textContent = "Twitter / X";
                socialLinks.insertBefore(twitterLink, socialLinks.children[1]);
            }
        }

        function appendBadge(container, iconId, text) {
            const badge = document.createElement('div');
            badge.className = 'badge';

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            const use = document.createElementNS("http://www.w3.org/2000/svg", "use");
            use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', `#${iconId}`);
            svg.appendChild(use);

            const span = document.createElement('span');
            span.textContent = text;

            badge.appendChild(svg);
            badge.appendChild(span);
            container.appendChild(badge);
        }

        function renderRepos(repos) {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';

            if (repos.length === 0) {
                grid.textContent = "Aucun dépôt public pour le moment.";
                return;
            }

            repos.forEach(repo => {
                const card = document.createElement('article');
                card.className = 'card';

                const titleHeading = document.createElement('h3');
                titleHeading.className = 'card-title';
                const titleLink = document.createElement('a');
                titleLink.href = repo.html_url;
                titleLink.target = "_blank";
                titleLink.rel = "noopener noreferrer";
                titleLink.textContent = repo.name;
                titleHeading.appendChild(titleLink);

                const descP = document.createElement('p');
                descP.className = 'card-desc';
                descP.textContent = repo.description || "Aucune description fournie.";

                const footer = document.createElement('div');
                footer.className = 'card-footer';

                if (repo.language) {
                    const langDiv = document.createElement('div');
                    langDiv.className = 'stat';
                    const dot = document.createElement('span');
                    dot.className = 'lang-dot';
                    dot.style.backgroundColor = getLangColor(repo.language);
                    const langText = document.createElement('span');
                    langText.textContent = repo.language;
                    langDiv.appendChild(dot);
                    langDiv.appendChild(langText);
                    footer.appendChild(langDiv);
                }

                if (repo.stargazers_count > 0) {
                    const starDiv = document.createElement('div');
                    starDiv.className = 'stat';
                    starDiv.innerHTML = `<svg><use href="#icon-star"></use></svg> <span>${repo.stargazers_count}</span>`;
                    footer.appendChild(starDiv);
                }

                if (repo.forks_count > 0) {
                    const forkDiv = document.createElement('div');
                    forkDiv.className = 'stat';
                    forkDiv.innerHTML = `<svg><use href="#icon-fork"></use></svg> <span>${repo.forks_count}</span>`;
                    footer.appendChild(forkDiv);
                }

                card.appendChild(titleHeading);
                card.appendChild(descP);
                card.appendChild(footer);
                grid.appendChild(card);
            });
        }

        function renderLanguages(repos) {
            const container = document.getElementById('languages-container');
            container.innerHTML = '';

            const languagesSet = new Set();
            repos.forEach(repo => {
                if (repo.language) languagesSet.add(repo.language);
            });

            if (languagesSet.size === 0) {
                container.textContent = "Aucun langage détecté dans les dépôts récents.";
                return;
            }

            languagesSet.forEach(lang => {
                const tag = document.createElement('div');
                tag.className = 'lang-tag';

                const dot = document.createElement('span');
                dot.className = 'lang-dot';
                dot.style.backgroundColor = getLangColor(lang);

                const text = document.createElement('span');
                text.textContent = lang;

                tag.appendChild(dot);
                tag.appendChild(text);
                container.appendChild(tag);
            });
        }

        document.addEventListener('DOMContentLoaded', fetchGitHubData);
    </script>
</body>

</html>
